name: Build Flutter APK

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    name: Build APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.5'
          channel: stable

      - name: Cache pub dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.pub-cache
            .dart_tool
          key: ${{ runner.os }}-pub-${{ hashFiles('**/pubspec.yaml', '**/pubspec.lock') }}
          restore-keys: |
            ${{ runner.os }}-pub-

      - name: Install dependencies
        run: flutter pub get

      - name: Fix plugin compatibility
        run: |
          # Find pdf_text plugin directory (could be in .pub-cache or cached in build)
          PDF_TEXT_DIR=$(find $HOME/.pub-cache -path '*/pdf_text*/android/build.gradle' 2>/dev/null | head -1)
          if [ -z "$PDF_TEXT_DIR" ]; then
            PDF_TEXT_DIR=$(find .dart_tool -path '*/pdf_text*/android/build.gradle' 2>/dev/null | head -1)
          fi
          if [ -z "$PDF_TEXT_DIR" ]; then
            PDF_TEXT_DIR=$(find /opt -path '*/pdf_text*/android/build.gradle' 2>/dev/null | head -1)
          fi
          echo "Found pdf_text build.gradle at: $PDF_TEXT_DIR"
          if [ -n "$PDF_TEXT_DIR" ]; then
            # Upgrade Kotlin plugin from 1.3.50 to 1.8.22 (AGP 8.x requires 1.5.20+)
            sed -i 's/1\.3\.50/1.8.22/g' "$PDF_TEXT_DIR"
            # Add namespace if missing (required by AGP 8.x)
            if ! grep -q 'namespace' "$PDF_TEXT_DIR"; then
              sed -i '/android {/a\        namespace "com.abdallah.pdf_text"' "$PDF_TEXT_DIR"
            fi
            echo "Patched pdf_text build.gradle:"
            cat "$PDF_TEXT_DIR"
          else
            echo "WARNING: Could not find pdf_text build.gradle to patch"
          fi

      - name: Analyze code
        run: flutter analyze
        continue-on-error: true

      - name: Build Debug APK
        run: flutter build apk --debug

      - name: Build Release APK
        run: flutter build apk --release

      - name: Upload Debug APK
        uses: actions/upload-artifact@v4
        with:
          name: app-debug
          path: build/app/outputs/flutter-apk/app-debug.apk
          retention-days: 30
          if-no-files-found: error

      - name: Upload Release APK
        uses: actions/upload-artifact@v4
        with:
          name: app-release
          path: build/app/outputs/flutter-apk/app-release.apk
          retention-days: 30
          if-no-files-found: error

      - name: Upload Build Logs
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: build-logs
          path: |
            build/**/log
            .dart_tool/**/error_log*
          retention-days: 7
          if-no-files-found: ignore