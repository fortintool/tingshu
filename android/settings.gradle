pluginManagement {
    def flutterSdkPath = {
        def properties = new Properties()
        def localPropertiesFile = file("local.properties")
        if (localPropertiesFile.exists()) {
            localPropertiesFile.withInputStream { properties.load(it) }
        }
        def flutterSdkPath = properties.getProperty("flutter.sdk")
        if (flutterSdkPath == null) {
            flutterSdkPath = System.getenv("FLUTTER_ROOT")
        }
        assert flutterSdkPath != null, "flutter.sdk not set in local.properties and FLUTTER_ROOT not set"
        return flutterSdkPath
    }()

    includeBuild("$flutterSdkPath/packages/flutter_tools/gradle")

    repositories {
        google()
        mavenCentral()
        gradlePluginPortal()
    }

    resolutionStrategy {
        eachPlugin {
            if (requested.id.id.startsWith("org.jetbrains.kotlin.")) {
                useVersion("1.8.22")
            }
        }
    }
}

plugins {
    id "dev.flutter.flutter-plugin-loader" version "1.0.0"
    id "com.android.application" version "8.1.0" apply false
    id "org.jetbrains.kotlin.android" version "1.8.22" apply false
}

include ":app"

// Force Kotlin version for all subprojects (fixes old plugins like pdf_text)
gradle.beforeProject { project ->
    project.buildscript.configurations.maybeCreate("classpath")
    project.buildscript.configurations.classpath.resolutionStrategy.eachDependency {
        if (requested.group == "org.jetbrains.kotlin") {
            useVersion("1.8.22")
        }
    }
    project.ext.set("kotlin_version", "1.8.22")
}

// Fix for plugins that don't specify a namespace (required by AGP 8.x)
gradle.allprojects { project ->
    project.afterEvaluate {
        if (project.hasProperty("android")) {
            project.android {
                if (namespace == null || namespace.isEmpty()) {
                    namespace project.group.toString()
                }
            }
        }
    }
}
